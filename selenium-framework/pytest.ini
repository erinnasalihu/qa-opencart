[pytest]
addopts = -ra --strict-markers --tb=short --html=reports/report.html --self-contained-html
testpaths = tests
markers =
    smoke: smoke tests, must pass on every push
    p1: priority-1 functional tests
    p2: priority-2 functional tests
    security: negative security tests (XSS / SQLi regression)
    regression: full regression suite
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s: %(message)s
